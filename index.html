<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News / お知らせ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/style.css">
  </head>

  <body>
<section class="news">
  <div class="news__inner">

      <h2 class="news__heading">
        <span class="news__heading-en">News</span>
        <span class="news__heading-ja">お知らせ</span>
      </h2>


    <div class="news__list">

      <article class="news__item">
        <a href="#" class="news__link">
        <time class="news__date" datetime="2024-03-15">2024.03.15</time>
        <span class="news__label news__label--important">重要</span>
        <p class="news__title">システムメンテナンスのお知らせ（3月20日）</p>
        <span class="news__arrow"></span>
        </a>
      </article>

      <article class="news__item">
        <a href="#" class="news__link">
        <time class="news__date" datetime="2024-03-10">2024.03.10</time>
        <span class="news__label news__label--event">イベント</span>
        <p class="news__title">【4/1開催】春のWebクリエイター交流会</p>
        <span class="news__arrow"></span>
        </a>
      </article>

      <article class="news__item">
        <a href="#" class="news__link">
        <time class="news__date" datetime="2024-03-01">2024.03.01</time>
        <span class="news__label news__label--update">アップデート</span>
        <p class="news__title">ポートフォリオ機能に「ソート機能」を追加しました</p>
        <span class="news__arrow"></span>
        </a>
      </article>

      <article class="news__item">
        <a href="#" class="news__link">
        <time class="news__date" datetime="2024-02-20">2024.02.20</time>
        <span class="news__label news__label--important">重要</span>
        <p class="news__title">【注意喚起】弊社を装った不審なメールについて</p>
        <span class="news__arrow"></span>
        </a>
      </article>

    </div>

    <div class="news__btn-wrap">
      <a href="#" class="news__btn">View All</a>
    </div>

  </div>
</section>

</body>
</html>
